<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tests — Convocatoria Formaciones</title>
</head>
<body>
  <h1>Test Results (check console)</h1>
  <pre id="output"></pre>
  <script>
    const out = document.getElementById('output');
    let passed = 0, failed = 0;

    function assert(condition, msg) {
      if (!condition) {
        failed++;
        const line = '✗ FAIL: ' + msg;
        console.error(line);
        out.textContent += line + '\n';
        return;
      }
      passed++;
      const line = '✓ PASS: ' + msg;
      console.log(line);
      out.textContent += line + '\n';
    }

    function summary() {
      const line = '\n' + passed + ' passed, ' + failed + ' failed';
      console.log(line);
      out.textContent += line;
    }

    // ═══════════════════════════════════════
    // LOGIC FUNCTIONS (same as in main file)
    // ═══════════════════════════════════════

    const RELEVANT_COLUMNS = [
      'Empresa', 'Departamento', 'Área', 'Ubicación', 'Puesto',
      'Categoría Mercer', 'Depende de', 'Email trabajo', 'Empleado',
      'NIF', 'Alta/Baja'
    ];

    const FILTER_KEYS = [
      'Empresa', 'Departamento', 'Área', 'Ubicación', 'Puesto',
      'Categoría Mercer', 'Depende de'
    ];

    function parseOrgSheet(workbook) {
      const errors = [];
      const sheetName = workbook.SheetNames.find(n => n === 'ORGANIGRAMA');
      if (!sheetName) {
        errors.push('No se ha encontrado la hoja ORGANIGRAMA. ¿Estás usando el fichero correcto?');
        return { employees: [], errors };
      }

      const sheet = workbook.Sheets[sheetName];
      const rows = XLSX_sheetToJSON(sheet);
      if (rows.length === 0) {
        errors.push('La hoja ORGANIGRAMA está vacía.');
        return { employees: [], errors };
      }

      const headers = Object.keys(rows[0]);
      const missing = RELEVANT_COLUMNS.filter(c => !headers.includes(c));
      if (missing.length > 0) {
        errors.push('Faltan columnas: ' + missing.join(', '));
      }

      const employees = rows
        .filter(row => {
          const ab = row['Alta/Baja'];
          return ab === 1 || ab === '1';
        })
        .map(row => {
          const emp = {};
          RELEVANT_COLUMNS.forEach(col => {
            emp[col] = row[col] != null ? String(row[col]).trim() : '';
          });
          return emp;
        });

      if (employees.length === 0) {
        errors.push('No hay empleados activos (Alta/Baja = 1).');
      }

      return { employees, errors };
    }

    // Mock for XLSX.utils.sheet_to_json (in tests only)
    function XLSX_sheetToJSON(sheet) {
      return sheet.__mockRows || [];
    }

    function filterEmployees(employees, activeFilters) {
      return employees.filter(emp => {
        return FILTER_KEYS.every(key => {
          const selected = activeFilters[key];
          if (!selected || selected.length === 0) return true;
          return selected.includes(emp[key]);
        });
      });
    }

    function getFilterOptions(employees, activeFilters) {
      const options = {};
      FILTER_KEYS.forEach(key => {
        const otherFilters = {};
        FILTER_KEYS.forEach(k => {
          if (k !== key && activeFilters[k] && activeFilters[k].length > 0) {
            otherFilters[k] = activeFilters[k];
          }
        });
        const subset = filterEmployees(employees, otherFilters);
        const values = [...new Set(subset.map(e => e[key]).filter(v => v !== ''))];
        values.sort((a, b) => a.localeCompare(b, 'es'));
        options[key] = values;
      });
      return options;
    }

    function buildDeepLink(event, attendees) {
      const startdt = event.date + 'T' + event.startTime + ':00';
      const enddt = event.date + 'T' + event.endTime + ':00';

      const params = new URLSearchParams();
      params.set('subject', event.title);
      params.set('startdt', startdt);
      params.set('enddt', enddt);
      if (event.location && !event.isTeams) {
        params.set('location', event.location);
      }
      if (event.body) {
        params.set('body', event.body);
      }

      const baseUrl = 'https://outlook.office.com/calendar/0/deeplink/compose?' + params.toString();
      const emailStr = attendees.join(';');
      const fullUrl = baseUrl + '&to=' + encodeURIComponent(emailStr);

      const useFallback = fullUrl.length > 2000;

      return {
        url: useFallback ? baseUrl : fullUrl,
        urlWithoutAttendees: baseUrl,
        useFallback,
        emailString: emailStr
      };
    }

    function generateSeriesDates(startDate, repeatEvery, count) {
      const dates = [];
      const start = new Date(startDate + 'T00:00:00');
      const increment = repeatEvery === 'week' ? 7 : 1;
      for (let i = 0; i < Math.min(count, 12); i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i * increment);
        dates.push(d.toISOString().slice(0, 10));
      }
      return dates;
    }

    function splitByEmail(employees) {
      const valid = [];
      const noEmail = [];
      employees.forEach(emp => {
        if (emp['Email trabajo'] && emp['Email trabajo'].includes('@')) {
          valid.push(emp);
        } else {
          noEmail.push(emp);
        }
      });
      return { valid, noEmail };
    }

    // ═══════════════════════════════════════
    // TESTS
    // ═══════════════════════════════════════

    const MOCK_EMPLOYEES = [
      { Empresa: 'BEBINTER, S.A.', Departamento: 'Operaciones', 'Área': 'Delegaciones Norte', Ubicación: 'HDE-Ólvega', Puesto: 'Repartidor', 'Categoría Mercer': '6. Operario', 'Depende de': 'Resp. Norte', 'Email trabajo': 'emp1@agoragp.com', Empleado: 'García López, Juan', NIF: '12345678A', 'Alta/Baja': '1' },
      { Empresa: 'BEBINTER, S.A.', Departamento: 'Comercial', 'Área': 'Delegaciones Norte', Ubicación: 'Zaragoza-San José', Puesto: 'KAM Nacional', 'Categoría Mercer': '4. Responsable', 'Depende de': 'Dir. Alimentación', 'Email trabajo': 'emp2@agoragp.com', Empleado: 'Martínez Ruiz, Ana', NIF: '23456789B', 'Alta/Baja': '1' },
      { Empresa: 'AGORA, S.A.', Departamento: 'Alimentación', 'Área': 'CODIR', Ubicación: 'HDI-Madrid', Puesto: 'Director', 'Categoría Mercer': '1. Executive', 'Depende de': 'CEO', 'Email trabajo': 'emp3@agoragp.com', Empleado: 'Pérez Terán, Gustavo', NIF: '34567890C', 'Alta/Baja': '1' },
      { Empresa: 'AGORA, S.A.', Departamento: 'Operaciones', 'Área': 'Cartuja', Ubicación: 'Zaragoza-Cartuja', Puesto: 'Operario', 'Categoría Mercer': '6. Operario', 'Depende de': 'Enc. Almacén', 'Email trabajo': '', Empleado: 'Sin Email, Pepe', NIF: '45678901D', 'Alta/Baja': '1' },
    ];

    // -- parseOrgSheet --
    (function testParseOrgSheet() {
      let result = parseOrgSheet({ SheetNames: ['Hoja1'], Sheets: {} });
      assert(result.errors.length === 1, 'parseOrgSheet: error when ORGANIGRAMA missing');
      assert(result.errors[0].includes('ORGANIGRAMA'), 'parseOrgSheet: error message mentions ORGANIGRAMA');

      const mockSheet = {
        __mockRows: [
          { 'Alta/Baja': 1, Empleado: 'Active One', 'Email trabajo': 'a@b.com', NIF: '111', Empresa: 'X', Departamento: 'Y', 'Área': 'Z', Ubicación: 'U', Puesto: 'P', 'Categoría Mercer': 'C', 'Depende de': 'D' },
          { 'Alta/Baja': 0, Empleado: 'Inactive', 'Email trabajo': 'c@d.com', NIF: '222', Empresa: 'X', Departamento: 'Y', 'Área': 'Z', Ubicación: 'U', Puesto: 'P', 'Categoría Mercer': 'C', 'Depende de': 'D' },
          { 'Alta/Baja': 1, Empleado: 'Active Two', 'Email trabajo': 'e@f.com', NIF: '333', Empresa: 'X', Departamento: 'Y', 'Área': 'Z', Ubicación: 'U', Puesto: 'P', 'Categoría Mercer': 'C', 'Depende de': 'D' },
        ]
      };
      result = parseOrgSheet({ SheetNames: ['ORGANIGRAMA'], Sheets: { 'ORGANIGRAMA': mockSheet } });
      assert(result.employees.length === 2, 'parseOrgSheet: filters to active employees only');
      assert(result.errors.length === 0, 'parseOrgSheet: no errors with valid data');
    })();

    // -- filterEmployees --
    (function testFilterEmployees() {
      let result = filterEmployees(MOCK_EMPLOYEES, {});
      assert(result.length === 4, 'filterEmployees: no filters returns all');

      result = filterEmployees(MOCK_EMPLOYEES, { Empresa: ['BEBINTER, S.A.'] });
      assert(result.length === 2, 'filterEmployees: filter by Empresa');

      result = filterEmployees(MOCK_EMPLOYEES, { Empresa: ['BEBINTER, S.A.'], Departamento: ['Operaciones'] });
      assert(result.length === 1, 'filterEmployees: multi-filter narrows results');
      assert(result[0].Empleado === 'García López, Juan', 'filterEmployees: correct employee returned');

      result = filterEmployees(MOCK_EMPLOYEES, { Empresa: ['NONEXISTENT'] });
      assert(result.length === 0, 'filterEmployees: no matches returns empty');
    })();

    // -- getFilterOptions (cross-cascading) --
    (function testGetFilterOptions() {
      let opts = getFilterOptions(MOCK_EMPLOYEES, {});
      assert(opts.Empresa.includes('BEBINTER, S.A.'), 'getFilterOptions: BEBINTER in options');
      assert(opts.Empresa.includes('AGORA, S.A.'), 'getFilterOptions: AGORA in options');

      opts = getFilterOptions(MOCK_EMPLOYEES, { Empresa: ['BEBINTER, S.A.'] });
      assert(opts.Departamento.includes('Operaciones'), 'cross-cascade: Operaciones available');
      assert(opts.Departamento.includes('Comercial'), 'cross-cascade: Comercial available');
      assert(!opts.Departamento.includes('Alimentación'), 'cross-cascade: Alimentación excluded');

      assert(opts.Empresa.includes('AGORA, S.A.'), 'cross-cascade: Empresa still shows AGORA');
    })();

    // -- buildDeepLink --
    (function testBuildDeepLink() {
      const event = {
        title: 'Formación PRL',
        date: '2026-04-15',
        startTime: '10:00',
        endTime: '12:00',
        location: 'Sala Madrid',
        isTeams: false,
        body: ''
      };

      let result = buildDeepLink(event, ['a@b.com', 'c@d.com']);
      assert(result.url.includes('outlook.office.com'), 'deepLink: correct domain');
      assert(result.url.includes('subject=Formaci'), 'deepLink: subject in URL');
      assert(result.url.includes('startdt=2026-04-15T10%3A00'), 'deepLink: startdt in URL');
      assert(!result.useFallback, 'deepLink: no fallback for 2 attendees');

      const teamsEvent = { ...event, isTeams: true };
      result = buildDeepLink(teamsEvent, ['a@b.com']);
      assert(!result.url.includes('location='), 'deepLink: no location for Teams');

      const manyEmails = Array.from({ length: 80 }, (_, i) => `employee${i}@agoragp.com`);
      result = buildDeepLink(event, manyEmails);
      assert(result.useFallback, 'deepLink: fallback for 80 attendees');
      assert(!result.url.includes('to='), 'deepLink: fallback URL has no attendees');
      assert(result.emailString.includes(';'), 'deepLink: emailString has semicolons');
    })();

    // -- generateSeriesDates --
    (function testGenerateSeriesDates() {
      let dates = generateSeriesDates('2026-04-15', 'week', 3);
      assert(dates.length === 3, 'series: 3 dates generated');
      assert(dates[0] === '2026-04-15', 'series: first date is start');
      assert(dates[1] === '2026-04-22', 'series: second date is +7 days');
      assert(dates[2] === '2026-04-29', 'series: third date is +14 days');

      dates = generateSeriesDates('2026-01-01', 'week', 20);
      assert(dates.length === 12, 'series: capped at 12');
    })();

    // -- splitByEmail --
    (function testSplitByEmail() {
      const result = splitByEmail(MOCK_EMPLOYEES);
      assert(result.valid.length === 3, 'splitByEmail: 3 with valid email');
      assert(result.noEmail.length === 1, 'splitByEmail: 1 without email');
      assert(result.noEmail[0].Empleado === 'Sin Email, Pepe', 'splitByEmail: correct employee without email');
    })();

    summary();
  </script>
</body>
</html>
